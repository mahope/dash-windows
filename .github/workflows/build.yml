name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          PR_VERSION=$(node -p 'require("./package.json").version')
          MAIN_VERSION=$(git show origin/main:package.json | node -p 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).version')
          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version in package.json ($PR_VERSION) was not bumped. Please update the version before merging."
            exit 1
          fi
          echo "Version bumped: $MAIN_VERSION -> $PR_VERSION"

  build-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-rebuild -f -w node-pty,better-sqlite3

      - name: Build
        run: pnpm build

      - name: Package
        run: pnpm exec electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dash-win-x64
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

  build-linux:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-rebuild -f -w node-pty,better-sqlite3

      - name: Build
        run: pnpm build

      - name: Package
        run: pnpm exec electron-builder --linux --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dash-linux-x64
          path: |
            release/*.AppImage
            release/*.yml
          if-no-files-found: error

  release:
    if: github.event_name != 'pull_request'
    needs: [build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: Dash-win-x64
          path: artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: Dash-linux-x64
          path: artifacts
        continue-on-error: true

      - name: Check if version tag exists
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.version }}" | grep -q .; then
            echo "::error::Version ${{ steps.version.outputs.version }} already released. Bump the version in package.json before merging."
            exit 1
          fi

      - name: Create tagged release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Dash ${{ steps.version.outputs.version }}" \
            --generate-notes \
            artifacts/*
